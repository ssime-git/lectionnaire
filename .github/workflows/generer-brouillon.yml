name: Générer un brouillon du lectionnaire

# Deux déclencheurs, un même garde-fou : la fusion de la PR reste humaine.
# - workflow_dispatch : n'importe quelle date, à la demande.
# - cron nocturne 02:20 UTC (04:20 à Paris l'été) : génère le jour SUIVANT,
#   juste après la remise à zéro du quota gratuit Workers AI (00:00 UTC).
on:
  workflow_dispatch:
    inputs:
      date:
        description: Date liturgique au format AAAA-MM-JJ
        required: true
        type: string
  schedule:
    - cron: "20 2 * * *"

permissions:
  contents: write
  pull-requests: write

jobs:
  generer:
    name: Générer et proposer le brouillon
    runs-on: ubuntu-latest
    steps:
      - name: Déterminer la date à générer
        id: date
        env:
          DATE_DEMANDEE: ${{ inputs.date }}
        run: |
          if [ -n "$DATE_DEMANDEE" ]; then
            DATE="$DATE_DEMANDEE"
          else
            DATE=$(TZ=Europe/Paris date -d tomorrow +%F)
          fi
          if ! [[ "$DATE" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]]; then
            echo "La date doit avoir le format AAAA-MM-JJ."
            exit 2
          fi
          echo "date=$DATE" >> "$GITHUB_OUTPUT"
          echo "Date retenue : $DATE"

      - name: Récupérer main
        uses: actions/checkout@v6
        with:
          ref: main

      # Un jour déjà écrit (démo à la main, brouillon déjà mergé) ne se
      # régénère pas : la PR proposerait d'écraser une page relue par un
      # humain. On s'arrête proprement, sans échec.
      - name: Ne pas écraser un jour déjà écrit
        id: existe
        run: |
          if [ -f "data/jours/${{ steps.date.outputs.date }}.json" ]; then
            echo "Le jour ${{ steps.date.outputs.date }} existe déjà — rien à générer."
            echo "deja=true" >> "$GITHUB_OUTPUT"
          else
            echo "deja=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Installer uv
        if: steps.existe.outputs.deja == 'false'
        uses: astral-sh/setup-uv@v7

      - name: Installer les dépendances verrouillées
        if: steps.existe.outputs.deja == 'false'
        run: uv sync --locked

      - name: Lancer les tests
        if: steps.existe.outputs.deja == 'false'
        run: make test

      - name: Générer le contrat avec Workers AI
        id: workers-ai
        if: steps.existe.outputs.deja == 'false'
        continue-on-error: true
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_AI_API_TOKEN: ${{ secrets.CLOUDFLARE_AI_API_TOKEN }}
        run: make generate DATE=${{ steps.date.outputs.date }}

      # Un contrat généré mais refusé par le validateur (même après la passe de
      # réparation côté generate.py) déclenche aussi la bascule : run du 14
      # juillet, 9 fautes de gloses. Cette validation-ci est un aiguillage,
      # pas un verdict — le verdict est l'étape « Valider le contrat ».
      - name: Valider le brouillon Workers AI
        id: validation-workers
        if: steps.workers-ai.outcome == 'success'
        continue-on-error: true
        run: make validate DATE=${{ steps.date.outputs.date }}

      # Filet de secours : quota Workers AI épuisé, panne du moteur principal,
      # ou brouillon irréparable → Claude Code headless, couvert par
      # l'abonnement Claude Pro. Voie officielle : token généré par
      # `claude setup-token`, stocké dans le secret CLAUDE_CODE_OAUTH_TOKEN.
      - name: Générer avec Claude en secours (abonnement Pro)
        if: steps.workers-ai.outcome == 'failure' || steps.validation-workers.outcome == 'failure'
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          LECTIONNAIRE_MOTEUR: claude
        run: |
          echo "Workers AI a échoué ou son brouillon est invalide — bascule sur Claude (claude-sonnet-5)."
          npm install -g @anthropic-ai/claude-code
          make generate DATE=${{ steps.date.outputs.date }}

      - name: Valider le contrat
        if: steps.existe.outputs.deja == 'false'
        run: make validate DATE=${{ steps.date.outputs.date }}

      - name: Rendre l'aperçu HTML
        if: steps.existe.outputs.deja == 'false'
        run: make render DATE=${{ steps.date.outputs.date }}

      - name: Ouvrir la pull request de relecture
        if: steps.existe.outputs.deja == 'false'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: draft/${{ steps.date.outputs.date }}
          base: main
          title: "Brouillon du lectionnaire — ${{ steps.date.outputs.date }}"
          commit-message: "Brouillon du lectionnaire pour le ${{ steps.date.outputs.date }}"
          body: |
            Brouillon généré automatiquement (`${{ steps.date.outputs.date }}`),
            validé puis rendu. Relecture dans l'aperçu Cloudflare Pages de
            cette PR (lien dans les checks ci-dessous).

            ## Checklist de relecture

            - [ ] Exactitude biblique : références, texte Segond, versets
            - [ ] Gloses : mot original, choix de traduction, réception — pas de définition de dictionnaire
            - [ ] Racines : attributions patristiques vérifiées (rien d'inventé)
            - [ ] Analogie : choisir la variante (`analogie.choisi` : 0, 1 ou 2)
            - [ ] Ton : sobre, sans formules creuses
            - [ ] Gravure : vérifier le bois gravé (généré ; le retoucher à la main si besoin)

            Pour corriger : éditer `data/jours/${{ steps.date.outputs.date }}.json`
            directement dans la PR — le HTML est re-rendu automatiquement à
            chaque commit, et l'aperçu Pages se met à jour.

            La fusion publie le jour sur le site. Ne pas fusionner sans
            relecture humaine.
          add-paths: |
            data/jours/${{ steps.date.outputs.date }}.json
            docs/${{ steps.date.outputs.date }}.html
            docs/index.html
